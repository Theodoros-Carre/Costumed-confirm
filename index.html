<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Costumed — Email Confirmed</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0e0e0e;
    color: white;
    font-family: 'Roboto', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .card {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 20px;
    padding: 48px 40px;
    max-width: 440px;
    width: 100%;
    text-align: center;
  }

  .logo {
    font-size: 32px;
    font-weight: 800;
    color: white;
    margin-bottom: 32px;
    letter-spacing: -1px;
  }

  .icon {
    width: 72px;
    height: 72px;
    background: #D32F2F;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
    font-size: 32px;
  }

  h1 {
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 12px;
  }

  p {
    color: #888;
    font-size: 15px;
    line-height: 1.6;
    margin-bottom: 32px;
  }

  .steps {
    background: #121212;
    border-radius: 12px;
    padding: 20px;
    text-align: left;
    margin-bottom: 32px;
  }

  .step {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 0;
    font-size: 14px;
    color: #aaa;
  }

  .step:not(:last-child) {
    border-bottom: 1px solid #1e1e1e;
  }

  .step-num {
    width: 24px;
    height: 24px;
    background: #D32F2F;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    flex-shrink: 0;
    color: white;
  }

  .footer {
    color: #444;
    font-size: 12px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">Costumed</div>

  <div class="icon">✓</div>

  <h1>Email confirmed!</h1>
  <p>Your account is now active. Open the Costumed app on your phone to start exploring outfits from your favourite characters.</p>

  <div class="steps">
    <div class="step">
      <div class="step-num">1</div>
      Open the Costumed app
    </div>
    <div class="step">
      <div class="step-num">2</div>
      Sign in with your email and password
    </div>
    <div class="step">
      <div class="step-num">3</div>
      Step into the role 👔
    </div>
  </div>

  <div class="footer">© Costumed — ESME Sudria</div>
</div>
</body>
</html>
